name: FreshTrack
options:
  bundleIdPrefix: com.freshtrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  FreshTrack:
    type: application
    platform: iOS
    sources:
      - FreshTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oguzgul.freshtrack
        MARKETING_VERSION: "1.3"
        CURRENT_PROJECT_VERSION: 8
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "FreshKeep uses your camera to scan product barcodes for quick entry."
        INFOPLIST_KEY_CFBundleDisplayName: FreshKeep
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: 5PY8Q784PU
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "FreshTrack AppStore"
    dependencies: []

  FreshTrackWidget:
    type: app-extension
    platform: iOS
    sources:
      - FreshTrackWidget
      - path: FreshTrack/Models/Product.swift
        excludes: []
    info:
      path: FreshTrackWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oguzgul.freshtrack.widget
        MARKETING_VERSION: "1.3"
        CURRENT_PROJECT_VERSION: 8
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        DEVELOPMENT_TEAM: 5PY8Q784PU
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "FreshTrack AppStore"
    dependencies: []
